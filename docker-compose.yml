version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kpi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kpi_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: kpi_adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - postgres

  backend:
    build: ./backend
    container_name: kpi_backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: 3600
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      MSSQL_SERVER: ${MSSQL_SERVER:-}
      MSSQL_PORT: ${MSSQL_PORT:-1433}
      MSSQL_DATABASE: ${MSSQL_DATABASE:-}
      MSSQL_USER: ${MSSQL_USER:-}
      MSSQL_PASSWORD: ${MSSQL_PASSWORD:-}
      MSSQL_ENCRYPT: ${MSSQL_ENCRYPT:-true}
      MSSQL_TRUST_SERVER_CERTIFICATE: ${MSSQL_TRUST_SERVER_CERTIFICATE:-true}
      MSSQL_SYNC_FECHA_DESDE: ${MSSQL_SYNC_FECHA_DESDE:-}
      MSSQL_SYNC_FECHA_HASTA: ${MSSQL_SYNC_FECHA_HASTA:-}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: kpi_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      LOG_LEVEL: info
      CRON_ENABLED: ${CRON_ENABLED:-true}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: kpi_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
