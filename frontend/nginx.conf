server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Resolver de Docker + proxy_pass con variable: si se resuelve "backend" al arrancar
    # nginx (proxy_pass con host literal), un arranque/reinicio del frontend mientras el
    # backend esta momentaneamente abajo tumba nginx completo (el SPA estatico incluido).
    # Con resolver + variable, la resolucion es perezosa por request.
    resolver 127.0.0.11 valid=30s;

    # Todas las llamadas al API pasan por el mismo origen (evita configurar CORS_ORIGIN en
    # el backend): nginx reenvia /api/* al contenedor backend por la red interna de Docker.
    location /api/ {
        set $backend_upstream backend;
        # $request_uri (no la ruta normalizada de la location) porque el prefijo /api/ es
        # identico en frontend y backend: pasa la URL tal cual sin que proxy_pass con
        # variable pierda la parte despues del prefijo (limitacion conocida de nginx).
        proxy_pass http://$backend_upstream:5000$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: cualquier ruta que no sea un archivo real cae en index.html (React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Los assets con hash en el nombre (JS/CSS de Vite) se pueden cachear agresivamente.
    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
